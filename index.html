<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOBITECH 통합 경영관리시스템 (BMS)</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <header class="border-b border-slate-800 bg-slate-950 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-emerald-400">MOBITECH BMS <span class="text-xs font-normal text-slate-400">v1.1 (Forecasting & Recurrent Rev)</span></h1>
            <div class="text-sm text-slate-400">전사 실시간 손익 및 파이프라인 관리</div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 space-y-8">
        <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                <p class="text-xs text-slate-400">당월 확정 매출 (REV)</p>
                <p id="total-rev" class="text-2xl font-bold text-blue-400 mt-1">0원</p>
            </div>
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                <p class="text-xs text-slate-400">정기 반복 매출 (SM / CV 수입)</p>
                <p id="recurring-rev" class="text-2xl font-bold text-purple-400 mt-1">0원</p>
                <span class="text-[10px] text-slate-500">안정적 비즈니스 지표</span>
            </div>
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                <p class="text-xs text-slate-400">다음 분기 예상 포캐스팅</p>
                <p id="forecast-rev" class="text-2xl font-bold text-amber-400 mt-1">0원</p>
                <span class="text-[10px] text-slate-500">파이프라인 추정치</span>
            </div>
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                <p class="text-xs text-slate-400">실시간 전사 영업이익</p>
                <p id="net-profit" class="text-2xl font-bold text-emerald-400 mt-1">0원</p>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-950 p-6 rounded-xl border border-slate-800 space-y-4">
                <h2 class="text-lg font-bold text-slate-200 border-b border-slate-800 pb-2">📂 프로젝트 및 포캐스팅 등록</h2>
                <form id="project-form" class="space-y-3 text-sm">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">사업 코드 (Project Code)</label>
                        <input type="text" id="p-code" placeholder="예: 25-SM-MOBITECH-01" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none" required>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">사업 유형</label>
                            <select id="p-type" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none">
                                <option value="SI">SI (신규구축)</option>
                                <option value="SL">SL (라이선스)</option>
                                <option value="SM">SM (정기유지보수 - 반복)</option>
                                <option value="CV">CV (서비스/구독 - 반복)</option>
                                <option value="MS">MS (솔루션유지보수)</option>
                                <option value="RD">R&D (자체개발)</option>
                                <option value="CS">CS (컨설팅)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">고객사명</label>
                            <input type="text" id="p-client" placeholder="고객사명" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none" required>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">확정 계약 금액 (원)</label>
                            <input type="number" id="p-contract" value="0" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">예측 포캐스팅 금액 (원)</label>
                            <input type="number" id="p-forecast" value="0" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">수주 성공 확률 (%)</label>
                        <input type="number" id="p-prob" value="100" min="0" max="100" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none">
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2 rounded transition">데이터베이스 저장</button>
                </form>
            </div>

            <div class="bg-slate-950 p-6 rounded-xl border border-slate-800 space-y-4">
                <h2 class="text-lg font-bold text-slate-200 border-b border-slate-800 pb-2">💰 전표 및 매출·비용 입력</h2>
                <form id="record-form" class="space-y-3 text-sm">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">대상 프로젝트 코드</label>
                        <select id="r-code" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">회계 연결 코드</label>
                            <select id="r-accounting" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none">
                                <option value="REV-SM">REV-SM (유지보수 매출)</option>
                                <option value="REV-SI">REV-SI (구축 매출)</option>
                                <option value="REV-SL">REV-SL (솔루션 매출)</option>
                                <option value="COS-LAB">COS-LAB (직접 인건비)</option>
                                <option value="COS-OUT">COS-OUT (외주비)</option>
                                <option value="COS-EXP">COS-EXP (직접 경비)</option>
                                <option value="ADM-REN">ADM-REN (임대/관리비)</option>
                                <option value="ADM-SAL">ADM-SAL (관리직 급여)</option>
                                <option value="ADM-GEN">ADM-GEN (일반 관리비)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">금액 (원)</label>
                            <input type="number" id="r-amount" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none" required>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 py-1">
                        <input type="checkbox" id="r-recurring" class="w-4 h-4 bg-slate-900 border-slate-700 rounded text-emerald-500 focus:ring-0">
                        <label for="r-recurring" class="text-xs text-slate-300">SM / CV 수입 등 매월 고정 반복 매출</label>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">발행/집계 기준일</label>
                        <input type="date" id="r-date" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 rounded transition">전표 등록하기</button>
                </form>
            </div>
        </section>

        <section class="bg-slate-950 p-6 rounded-xl border border-slate-800">
            <h2 class="text-lg font-bold text-slate-200 mb-4">📊 파이프라인 및 포캐스팅 비교 현황</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-slate-300">
                    <thead class="text-xs uppercase bg-slate-900 text-slate-400">
                        <tr>
                            <th class="px-4 py-3">사업코드</th>
                            <th class="px-4 py-3">유형</th>
                            <th class="px-4 py-3">고객사</th>
                            <th class="px-4 py-3">확정 계약금</th>
                            <th class="px-4 py-3">예측 포캐스팅금</th>
                            <th class="px-4 py-3">확률</th>
                        </tr>
                    </thead>
                    <tbody id="project-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // 질문자님의 진짜 고유 정보들을 연동해 두었습니다.
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4YnRmaGdqbnRwZ2N3b3lqa2JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDg4NTIsImV4cCI6MjA5NjMyNDg1Mn0.e488rS8JMCzoiPqhMbZBAON6eENXGIsvignV8cIUaE0";

        const supabase = supabasejs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.addEventListener('DOMContentLoaded', () => {
            loadProjects();
            loadDashboardMetrics();
        });

        async function loadProjects() {

<style>
  :root {
    --navy:   #0B1628;
    --navy2:  #112040;
    --navy3:  #1a2d52;
    --accent: #00D4FF;
    --accent2:#3B82F6;
    --green:  #10B981;
    --red:    #EF4444;
    --amber:  #F59E0B;
    --text:   #E2E8F0;
    --muted:  #94A3B8;

  * { box-sizing: border-box; }

    background: var(--navy);
    color: var(--text);

    background: var(--card);

    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--glow); }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));

  .kpi-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  .kpi-value { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 6px 0 2px; font-family: 'JetBrains Mono', monospace; }

  .badge-sm   { background: rgba(16,185,129,0.2); color: #34D399; border: 1px solid rgba(16,185,129,0.3); }
  .badge-sv   { background: rgba(245,158,11,0.2); color: #FCD34D; border: 1px solid rgba(245,158,11,0.3); }
  .badge-sol  { background: rgba(239,68,68,0.2);  color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }
  .badge-ct   { background: rgba(139,92,246,0.2); color: #C4B5FD; border: 1px solid rgba(139,92,246,0.3); }
  .badge-mt   { background: rgba(20,184,166,0.2); color: #5EEAD4; border: 1px solid rgba(20,184,166,0.3); }
  .badge { padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
  .editable-cell {
    background: rgba(0,212,255,0.04);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 6px;
    padding: 4px 8px;

    text-align: right;

    background: var(--navy3);

    border-radius: 8px;

    font-weight: 700;

  .chart-container { position: relative; }

    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(239,68,68,0.15); color: #FCA5A5;
    border: 1px solid rgba(239,68,68,0.3);

    display: inline-flex; align-items: center; gap: 4px;

// ─── 유틸리티 ───────────────────────────────────────────────────────────────
const fmt = (n) => Math.round(n).toLocaleString('ko-KR');
const fmtM = (n) => {
  const m = Math.abs(n);
  if (m >= 1e8) return (n/1e8).toFixed(1) + '억';
  if (m >= 1e4) return (n/1e4).toFixed(0) + '만';
  return fmt(n);
};
const pct = (n) => (n >= 0 ? '+' : '') + n.toFixed(1) + '%';

// 문자열 → 숫자 파싱 (콤마 제거)
const parseNum = (s) => {
  const n = Number(String(s).replace(/,/g, ''));
  return isNaN(n) ? 0 : n;
};

// 손익 계산 함수
const calcPnL = (p) => {
  const directTotal = (p.인건비합계 || 0) + (p.외주비||0) + (p.인프라비||0) + (p.상품매입가||0) + (p.장비원가||0) + (p.기타직접||0);
  const grossProfit = p.총매출액 - directTotal;
  const opProfit    = grossProfit - (p.배부판관비 || 0);
  const opRate      = p.총매출액 > 0 ? (opProfit / p.총매출액) * 100 : 0;
  const grossRate   = p.총매출액 > 0 ? (grossProfit / p.총매출액) * 100 : 0;
  return { directTotal, grossProfit, grossRate, opProfit, opRate };
};

// ─── KPI 카드 ────────────────────────────────────────────────────────────────
function KpiCard({ label, value, sub, color, icon }) {
  const colorMap = { cyan: '#00D4FF', green: '#10B981', amber: '#F59E0B', red: '#EF4444', blue: '#3B82F6' };
  const c = colorMap[color] || '#00D4FF';
  return (
    <div className="kpi-card fade-in">
      <div style={{ position:'absolute', top:16, right:16, fontSize:22, opacity:0.3 }}>{icon}</div>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value" style={{ color: c }}>{value}</div>
      <div className="kpi-sub">{sub}</div>
    </div>
  );
}

// ─── 차트: 월별 매출/이익 꺾은선 ────────────────────────────────────────────
function LineChartCard({ monthly }) {
  const ref = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) { chartRef.current.destroy(); }
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels: monthly.map(m => m.month),
        datasets: [
          {
            label: '매출액',
            data: monthly.map(m => m.revenue),
            borderColor: '#00D4FF',
            backgroundColor: 'rgba(0,212,255,0.06)',
            borderWidth: 2,
            tension: 0.4,
            fill: true,
            pointBackgroundColor: '#00D4FF',
            pointRadius: 4,
            pointHoverRadius: 7,
          },
          {
            label: '원가합계',
            data: monthly.map(m => m.cost),
            borderColor: '#EF4444',
            backgroundColor: 'rgba(239,68,68,0.04)',
            borderWidth: 2,
            tension: 0.4,
            fill: true,
            pointBackgroundColor: '#EF4444',
            pointRadius: 4,
            pointHoverRadius: 7,
          },
          {
            label: '영업이익',
            data: monthly.map(m => m.revenue - m.cost),
            borderColor: '#10B981',
            backgroundColor: 'rgba(16,185,129,0.05)',
            borderWidth: 2,
            tension: 0.4,
            fill: false,
            pointBackgroundColor: '#10B981',
            pointRadius: 3,
            pointHoverRadius: 6,
            borderDash: [4, 3],
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#94A3B8', font: { size: 11, family: 'Noto Sans KR' }, boxWidth: 12 } },
          tooltip: {
            backgroundColor: 'rgba(11,22,40,0.95)',
            borderColor: 'rgba(0,212,255,0.3)',
            borderWidth: 1,
            titleColor: '#E2E8F0',
            bodyColor: '#94A3B8',
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ₩${ctx.parsed.y.toLocaleString('ko-KR')}`
            }
          }
        },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748B', font: { size: 11 } } },
          y: {
            grid: { color: 'rgba(255,255,255,0.04)' },

              color: '#64748B', font: { size: 10, family: 'JetBrains Mono' },

        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [monthly]);

  return (
    <div className="glass p-4" style={{ height: 280 }}>
      <div className="section-title mb-3" style={{ fontSize:11 }}>📈 월별 매출 / 원가 / 영업이익 추이</div>
      <div className="chart-container" style={{ height: 230 }}>
        <canvas ref={ref}></canvas>
      </div>
    </div>
  );
}

// ─── 차트: 사업 유형별 도넛 ─────────────────────────────────────────────────
function DonutChartCard({ projects }) {
  const ref = useRef(null);
  const chartRef = useRef(null);

  const byType = useMemo(() => {
    const map = {};
    PROJECT_TYPES.forEach(t => { map[t] = 0; });
    projects.forEach(p => { map[p.type] = (map[p.type] || 0) + p.총매출액; });
    return map;
  }, [projects]);

  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: PROJECT_TYPES.map(t => `${t} (${TYPE_META[t].desc})`),
        datasets: [{
          data: PROJECT_TYPES.map(t => byType[t] || 0),
          backgroundColor: PROJECT_TYPES.map(t => TYPE_META[t].color + 'CC'),
          borderColor: PROJECT_TYPES.map(t => TYPE_META[t].color),
          borderWidth: 1.5,
          hoverOffset: 8,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '65%',
        plugins: {
          legend: { position: 'right', labels: { color: '#94A3B8', font: { size: 10, family: 'Noto Sans KR' }, boxWidth: 10, padding: 8 } },
          tooltip: {
            backgroundColor: 'rgba(11,22,40,0.95)',
            borderColor: 'rgba(255,255,255,0.1)',
            borderWidth: 1,
            callbacks: { label: ctx => ` ₩${ctx.parsed.toLocaleString('ko-KR')}` }
          }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [byType]);

  return (
    <div className="glass p-4" style={{ height: 280 }}>
      <div className="section-title mb-3" style={{ fontSize:11 }}>🥧 사업 유형별 매출 구성비</div>
      <div className="chart-container" style={{ height: 230 }}>
        <canvas ref={ref}></canvas>
      </div>
    </div>
  );
}

// ─── 차트: 프로젝트별 영업이익 바 ────────────────────────────────────────────
function BarChartCard({ projects }) {
  const ref = useRef(null);
  const chartRef = useRef(null);

  const pnlData = useMemo(() =>
    projects.map(p => ({ ...p, ...calcPnL(p) }))

  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();

  return (

}

// ─── 편집 가능 셀 ─────────────────────────────────────────────────────────────
function EditCell({ value, onChange, disabled }) {
  const [local, setLocal] = useState(fmt(value));
  const [focused, setFocused] = useState(false);

  useEffect(() => {
    if (!focused) setLocal(fmt(value));
  }, [value, focused]);

  const handleFocus = () => {
    setFocused(true);
    setLocal(String(Math.round(value)));
  };
  const handleBlur = () => {
    setFocused(false);
    const n = parseNum(local);
    setLocal(fmt(n));
    onChange(n);
  };
  const handleChange = (e) => { setLocal(e.target.value); };
  const handleKeyDown = (e) => { if (e.key === 'Enter') e.target.blur(); };

  return (
    <input
      type="text"
      className="editable-cell"
      value={local}
      onChange={handleChange}
      onFocus={handleFocus}
      onBlur={handleBlur}
      onKeyDown={handleKeyDown}
      disabled={disabled}
    />
  );
}

// ─── 손익 테이블 행 ──────────────────────────────────────────────────────────
function PnLRow({ proj, onUpdate, onToggleClose }) {
  const locked = proj.closing === '최종마감';
  const pnl = calcPnL(proj);

  const upd = (field) => (val) => {
    if (locked) return;
    onUpdate(proj.id, field, val);
  };

  const rateColor = (r) => r >= 20 ? 'profit-pos' : r >= 5 ? 'profit-neu' : 'profit-neg';

  return (
    <tr className="tbl-row">
      {/* 구분 */}
      <td className="tbl-cell" style={{ minWidth: 60 }}>
        <div style={{ display:'flex', flexDirection:'column', gap:4, alignItems:'center' }}>
          <span className={`badge ${TYPE_META[proj.type].bg}`}>{proj.type}</span>
          {locked
            ? <span className="tag-closed">🔒 마감</span>
            : <span className="tag-open">✏️ 수정</span>
          }
        </div>
      </td>
      {/* 프로젝트 */}
      <td className="tbl-cell" style={{ minWidth: 200 }}>
        <div style={{ fontSize:12, fontWeight:700, color:'#E2E8F0', marginBottom:2 }}>{proj.name}</div>
        <div style={{ fontSize:10, color:'var(--muted)', fontFamily:'JetBrains Mono' }}>{proj.code}</div>
        <div style={{ fontSize:10, color:'#60A5FA', marginTop:1 }}>{proj.client}</div>
      </td>
      {/* 수주액 */}
      <td className="tbl-cell" style={{ minWidth: 110 }}>
        <div className="readonly-cell" style={{ color:'#CBD5E1' }}>{fmt(proj.수주액)}</div>
      </td>
      {/* ★ 총매출액 (편집) */}
      <td className="tbl-cell" style={{ minWidth: 120 }}>
        <EditCell value={proj.총매출액} onChange={upd('총매출액')} disabled={locked}/>
      </td>
      {/* ★ 인건비합계 (편집) */}
      <td className="tbl-cell" style={{ minWidth: 120 }}>
        <EditCell value={proj.인건비합계} onChange={upd('인건비합계')} disabled={locked}/>
      </td>
      {/* ★ 직접원가합계 (편집: 외주+인프라+상품+장비+기타) */}
      <td className="tbl-cell" style={{ minWidth: 130 }}>
        <EditCell value={pnl.directTotal - proj.인건비합계} onChange={(v) => {
          // 직접원가(인건비 제외)를 입력하면 외주비에 반영
          upd('외주비')(Math.max(0, v - (proj.인프라비||0) - (proj.상품매입가||0) - (proj.장비원가||0) - (proj.기타직접||0)));
        }} disabled={locked}/>
        <div style={{ fontSize:10, color:'var(--muted)', marginTop:2 }}>
          <span title="외주비">외주:{fmtM(proj.외주비||0)}</span>
          {proj.인프라비>0 && <span title="인프라비"> | 인프라:{fmtM(proj.인프라비)}</span>}
          {proj.상품매입가>0 && <span title="상품매입가"> | 상품:{fmtM(proj.상품매입가)}</span>}
          {proj.장비원가>0 && <span title="장비원가"> | 장비:{fmtM(proj.장비원가)}</span>}
        </div>
      </td>
      {/* 직접원가합계 (자동) */}
      <td className="tbl-cell" style={{ minWidth: 110 }}>
        <div className="readonly-cell" style={{ color:'#FCA5A5' }}>{fmt(pnl.directTotal)}</div>
      </td>
      {/* ★ 배부판관비 (편집) */}
      <td className="tbl-cell" style={{ minWidth: 120 }}>
        <EditCell value={proj.배부판관비} onChange={upd('배부판관비')} disabled={locked}/>
      </td>
      {/* 매출총이익 (자동) */}
      <td className="tbl-cell" style={{ minWidth: 110 }}>
        <div className={`readonly-cell ${pnl.grossProfit >= 0 ? 'profit-pos' : 'profit-neg'}`}>
          {fmt(pnl.grossProfit)}
        </div>
        <div style={{ fontSize:10, color:'var(--muted)' }}>{pnl.grossRate.toFixed(1)}%</div>
      </td>
      {/* 영업이익 (자동) */}
      <td className="tbl-cell" style={{ minWidth: 110 }}>
        <div className={`readonly-cell mono ${pnl.opProfit >= 0 ? 'profit-pos' : 'profit-neg'}`} style={{ fontSize:15, fontWeight:700 }}>
          {fmt(pnl.opProfit)}
        </div>
      </td>
      {/* 영업이익률 (자동) */}
      <td className="tbl-cell" style={{ minWidth: 80 }}>
        <div className={`readonly-cell mono ${rateColor(pnl.opRate)}`} style={{ fontSize:15, fontWeight:700 }}>
          {pnl.opRate.toFixed(1)}%
        </div>
      </td>
      {/* 마감 제어 */}
      <td className="tbl-cell" style={{ minWidth: 100 }}>
        <button
          className={`btn ${locked ? 'btn-open' : 'btn-close'}`}
          onClick={() => onToggleClose(proj.id)}
        >
          {locked ? '🔓 수정열기' : '🔒 마감완료'}
        </button>
      </td>
    </tr>
  );
}

              { icon:'📥', label:'세금계산서 수취', desc:'외주비·매입원가', color:'#FCA5A5' },
              { icon:'💳', label:'법인신용카드', desc:'운영비·판관비', color:'#FCD34D' },
              { icon:'🏧', label:'체크카드·통장출금', desc:'소액경비·급여이체', color:'#86EFAC' },
              { icon:'🏦', label:'금융거래계좌', desc:'차입금·상환', color:'#C4B5FD' },
            ].map((item, i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontSize:18 }}>{item.icon}</span>
                <div>
                  <div style={{ fontSize:12, fontWeight:700, color: item.color }}>{item.label}</div>
                  <div style={{ fontSize:10, color:'var(--muted)' }}>{item.desc}</div>
                </div>
              </div>
            ))}
            <div style={{ marginLeft:'auto', textAlign:'right' }}>
              <div style={{ fontSize:10, color:'var(--muted)' }}>★ 표시 칼럼은 실무자 수정 가능</div>
              <div style={{ fontSize:10, color:'var(--muted)' }}>자동 계산: 직접원가합계 · 매출총이익 · 영업이익 · 이익률</div>
            </div>
          </div>
        </div>

        {/* ── 6대 사업유형 설명 ── */}
        <div className="glass" style={{ padding:'16px 20px', marginTop:12 }}>
          <div className="section-title" style={{ marginBottom:12 }}>⚙️ 6대 사업 유형별 핵심 원가 항목</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', gap:10 }}>
            {PROJECT_TYPES.map(type => {
              const meta = TYPE_META[type];
              const descs = {
                SI: ['인건비 M/M 관리', '투입공수 × 실행단가', 'DB_Timesheet 연동'],
                SM: ['월 고정비 관리', '정기 유지보수 인력', 'SLA 기반 청구'],
                SV: ['인프라비 분리 계상', '클라우드·서버 비용', '세금계산서 수취'],
                SOL: ['상품매입가 관리', '솔루션 라이선스', '마진율 핵심'],
                CT: ['단발성 직접경비', '컨설팅 인건비', '법인카드 증빙'],
                MT: ['장비매입원가', '물류비 분리', '검수·설치비 포함'],
              };
              return (
                <div key={type} style={{
                  background:'rgba(255,255,255,0.02)',
                  border:`1px solid ${meta.color}30`,
                  borderRadius:10, padding:'12px 14px',
                  borderTop:`2px solid ${meta.color}`,
                }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                    <span style={{ fontSize:18 }}>{meta.icon}</span>
                    <span className={`badge ${meta.bg}`}>{type}</span>
                  </div>
                  <div style={{ fontSize:11, fontWeight:700, color: meta.color, marginBottom:6 }}>{meta.desc}</div>
                  {descs[type].map((d,i) => (
                    <div key={i} style={{ fontSize:10, color:'var(--muted)', lineHeight:'1.6' }}>· {d}</div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>

        {/* ── 푸터 ── */}
        <div style={{ marginTop:16, textAlign:'center', color:'var(--muted)', fontSize:10, letterSpacing:'0.06em' }}>
          (주)모비텍 중앙 경영관리 시스템 v1.0 · Supabase PostgreSQL · React 18 · Chart.js 4 · Tailwind CSS
          &nbsp;·&nbsp; 국세청 증빙 체계 기반 · 6대 사업 유형 손익 실시간 추적
        </div>
      </div>
    </div>
  );
}

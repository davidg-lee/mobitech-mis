<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>로그인 — (주)모비텍 중앙 경영관리 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<style>
:root{--bg:#060B16;--bg2:#0B1424;--br:rgba(255,255,255,0.09);--tx:#E6EEF8;--mu:#7C8DB0;--acc:#00D4FF;--red:#EF4444}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--bg);color:var(--tx);
  font-family:'Noto Sans KR','Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;flex-direction:column}
.lg-box{width:100%;max-width:360px;background:var(--bg2);border:1px solid rgba(0,212,255,0.25);border-radius:14px;
  padding:34px 30px 28px;box-shadow:0 20px 70px rgba(0,0,0,0.6)}
.lg-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logo{font-size:26px;color:var(--acc)}
.lg-title{font-size:15px;font-weight:800;letter-spacing:-0.02em}
.lg-sub{font-size:10.5px;color:var(--mu);margin-bottom:22px}
.lg-field{margin-bottom:12px}
.lg-field label{display:block;font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.08em;margin-bottom:5px;text-transform:uppercase}
.lg-field input{width:100%;background:var(--bg);border:1px solid rgba(255,255,255,0.12);border-radius:8px;
  padding:10px 12px;color:var(--tx);font-size:13px;outline:none;font-family:inherit}
.lg-field input:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(0,212,255,0.15)}
.lg-btn{width:100%;margin-top:8px;padding:11px;border:none;border-radius:8px;cursor:pointer;
  background:linear-gradient(135deg,#00D4FF,#0091EA);color:#04121F;font-size:13px;font-weight:800;font-family:inherit}
.lg-btn:hover{filter:brightness(1.12)}
.lg-btn:disabled{opacity:.5;cursor:wait}
.lg-btn.ghost{background:transparent;border:1px solid var(--br);color:var(--mu);font-weight:700;margin-top:10px}
.lg-btn.ghost:hover{color:var(--tx);border-color:var(--acc)}
.lg-err{min-height:16px;margin-top:10px;font-size:11px;color:var(--red);text-align:center}
.lg-foot{margin-top:18px;font-size:9.5px;color:var(--mu);text-align:center;letter-spacing:.03em}
#localBtn{display:none}
</style>
</head>
<body>

<div class="lg-box">
  <div class="lg-logo"><div class="logo">⬡</div><div class="lg-title">(주)모비텍 중앙 경영관리 시스템</div></div>
  <div class="lg-sub">관리자 계정으로 로그인하세요</div>
  <div class="lg-field"><label>아이디</label><input id="lgId" autocomplete="username"></div>
  <div class="lg-field"><label>비밀번호</label><input id="lgPw" type="password" autocomplete="current-password"></div>
  <button class="lg-btn" id="lgBtn" onclick="doLogin()">로그인</button>
  <button class="lg-btn ghost" id="localBtn" onclick="localBypass()">로컬 샘플 모드로 둘러보기</button>
  <div class="lg-err" id="lgErr"></div>
  <div class="lg-foot">MOBITECH MANAGEMENT SYSTEM · AUTHORIZED ACCESS ONLY</div>
</div>

<script>
/* 이미 로그인 상태면 메인으로 */
try{
  if(sessionStorage.getItem('mbAuth')){location.replace('index.html');}
}catch(e){}

let sb=null;
if(sbConfigOk()){
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
}else{
  /* 키 미설정 → 로컬 모드 안내 */
  document.getElementById('lgErr').textContent='Supabase 미설정 — 로컬 샘플 모드만 사용 가능합니다';
  document.getElementById('lgBtn').disabled=true;
  document.getElementById('localBtn').style.display='block';
}

async function doLogin(){
  const id=document.getElementById('lgId').value.trim();
  const pw=document.getElementById('lgPw').value;
  const err=document.getElementById('lgErr');
  const btn=document.getElementById('lgBtn');
  if(!id||!pw){err.textContent='아이디와 비밀번호를 입력하세요';return;}
  btn.disabled=true;err.textContent='';
  try{
    const {data,error}=await sb.rpc('admin_login',{p_id:id,p_pw:pw});
    if(error)throw error;
    if(!data){err.textContent='아이디 또는 비밀번호가 올바르지 않습니다';btn.disabled=false;return;}
    sessionStorage.setItem('mbAuth',JSON.stringify(data));
    location.replace('index.html');
  }catch(e){
    err.textContent='로그인 처리 중 오류: '+e.message;btn.disabled=false;
  }
}

/* 로컬 샘플 모드 (DB 미설정 시) */
function localBypass(){
  const data={admin_id:'local',admin_name:'로컬모드',role_id:'ADMIN',
    menus:['dash','master','pnl','tax','bank','card'].map(m=>({menu_id:m,add_yn:'Y'}))};
  sessionStorage.setItem('mbAuth',JSON.stringify(data));
  location.replace('index.html');
}

['lgId','lgPw'].forEach(i=>document.getElementById(i).addEventListener('keydown',e=>{
  if(e.key==='Enter')doLogin();
}));
document.getElementById('lgId').focus();
</script>
</body>
</html>
